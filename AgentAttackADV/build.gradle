plugins {
    id 'java'
    id 'application'
    id 'eclipse'
}

group = 'com.agentattack'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    // Dipendenze di Javalin per il server
    implementation 'io.javalin:javalin-bundle:6.1.3'
    implementation 'org.slf4j:slf4j-simple:2.0.16'
}

// Configura la classe principale per il comando run
application {
    mainClass = 'javalin.JavalinServer'
}